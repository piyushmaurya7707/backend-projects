<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #8aceb4, #6aa6ff);
  }

  .container {
    background: #ffffff;
    padding: 30px 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
  }

  h1 {
    margin-bottom: 20px;
    color: #333;
  }

  input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    margin-bottom: 15px;
    transition: 0.3s;
  }

  input:focus {
    border-color: #6aa6ff;
    box-shadow: 0 0 5px rgba(106,166,255,0.5);
  }

  button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #355fbb;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #28a745;
    transform: scale(1.05);
  }

	</style>
</head>
<body>
	<div class="container">
		<h1>QR-Code-Generate</h1>
	<form action="/generate-qr" method="post">
		<input type="text" name="text" >
		<button type="submit">submit</button>
	</form>
	</div>
</body>
</html>
