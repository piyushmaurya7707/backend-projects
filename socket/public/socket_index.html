<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #63d2da;
}

/* Container for messages */
#messageList {
    height: 90vh;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

/* Input box container */
.box {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    padding: 10px;
    background: #f0f0f0;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
}

/* Input field */
#inputBox {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

/* Send button */
#sendBtn {
    margin-left: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #25d366;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#sendBtn:hover {
    background: #1ebe5d;
}

/* Message style */
.message {
    max-width: 60%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    word-wrap: break-word;
}
p{
    background-color: blueviolet;
    color: aliceblue;
    display: flex;
    border-radius: 30px;
}


</style>

<body>
    <div class="box">
    <input type="text" id="inputBox" />
    <button id="sendBtn"> send </button>
    </div>
    <div id="messageList"></div>


    <script src="/socket.io/socket.io.js"></script>
    <script>

        const socket = io();
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const messageList = document.getElementById('messageList');

        socket.on('message', (msg) => {
            const p = document.createElement('p');
            p.innerHTML = msg.text;
            messageList.appendChild(p);
        });


        sendBtn.addEventListener('click', () => {
            const msg = inputBox.value;
            console.log(msg);
            socket.emit('message', msg);
            inputBox.value = "";
        });


    </script>
</body>



</html>
